<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCI — Sistema Contra Incendio</title>
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: calc(100dvh - 64px - env(safe-area-inset-bottom, 0px));
      overflow: hidden;
    }

    header {
      background: #0054A6;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 15px;
      z-index: 10;
    }

    header img { height: 36px; }
    header h2 { font-size: 16px; font-weight: 500; }

    .toolbar {
      background: white;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar input {
      padding: 6px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 160px;
      outline: none;
    }
    .toolbar input:focus { border-color: #0054A6; }

    .toolbar button {
      background: #0054A6;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover { background: #003d7a; }
    .toolbar button.secondary {
      background: #666;
    }
    .toolbar button.secondary:hover { background: #444; }

    #plano {
      flex: 1;
      overflow: auto;
      background: #e8e8e8;
      display: block;
      cursor: grab;
      user-select: none;
      position: relative;
    }
    #plano.panning { cursor: grabbing; }

    #contenedorSVG {
      transform-origin: 0 0;
      display: block;
      flex-shrink: 0;
    }

    #contenedorSVG svg {
      display: block;
      width: 1541px;
      height: auto;
    }

    .activo text,
    .activo tspan {
      fill: red !important;
      font-weight: bold !important;
    }

    #info {
      position: fixed;
      right: 16px;
      top: 120px;
      width: 240px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 14px;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 100;
    }
    #info h3 {
      font-size: 15px;
      color: #0054A6;
      margin-bottom: 6px;
    }
    #info p { font-size: 13px; color: #444; }
    #info img { width: 100%; margin-top: 8px; border-radius: 4px; }
    #info .close-btn {
      margin-top: 10px;
      width: 100%;
      background: #888;
      color: white;
      border: none;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #info .close-btn:hover { background: #555; }

    
    #minimapa {
      position: fixed;
      bottom: calc(64px + env(safe-area-inset-bottom, 0px) + 16px);
      left: 16px;
      width: 350px;       /* 1541 * 0.1 * (286/154) ≈ exact aspect */
      height: 200px;       /* 20px header + 55px canvas (544*0.1=54.4) */
      background: #f0f0f0;
      border: 2px solid #0054A6;
      border-radius: 4px;
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      cursor: crosshair;
      display: none;
      transition: opacity 0.3s ease;
      opacity: 0;
      font-family: Arial, sans-serif;
    }
    #minimapa-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 20px;
      background: #0054A6;
      color: white;
      font-size: 10px;
      font-weight: 500;
      font-family: Arial, sans-serif;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      user-select: none;
      letter-spacing: 0.3px;
    }
    #minimapa-toggle {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      padding: 0 2px;
      opacity: 0.85;
    }
    #minimapa-toggle:hover { opacity: 1; }
    #minimapa canvas {
      display: block;
      position: absolute;
      top: 20px; left: 0;
      width: 100%;
      height: calc(100% - 20px);
      background: white;
    }
    #minimapa-visor {
      position: absolute;
      border: 2px solid #0054A6;
      background: rgba(0,84,166,0.10);
      pointer-events: none;
      border-radius: 1px;
      top: 20px;
    }
    #minimapa.collapsed { height: 24px; cursor: default; }
    #minimapa.collapsed canvas,
    #minimapa.collapsed #minimapa-visor { display: none; }

    

    
    @media (max-width: 600px) {
      header h2 { font-size: 13px; }
      header { padding: 8px 12px; gap: 10px; }
      header img { height: 28px; }

      .toolbar {
        padding: 6px 10px;
        gap: 6px;
        justify-content: center;
      }
      .toolbar input { width: 130px; font-size: 13px; }
      .toolbar button { font-size: 13px; padding: 6px 10px; }

      #plano {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-x pan-y pinch-zoom;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #contenedorSVG {
        margin: auto;
      }

      /* Minimapa oculto en movil */
      #minimapa { display: none !important; }

      #info { display: none !important; }
    }
  </style>
</head>

  <script>
    const SVG_W = 1541, SVG_H = 544;
    let scale = 1;
    let isPanning = false;
    let panStart = { x: 0, y: 0 };
    let scrollStart = { left: 0, top: 0 };

    const plano = document.getElementById("plano");
    const contenedor = document.getElementById("contenedorSVG");

    function applyScale(newScale, pivotX, pivotY) {
      const oldScale = scale;
      scale = Math.max(0.1, Math.min(newScale, 12));

      const ratio = scale / oldScale;
      const pRect = plano.getBoundingClientRect();

      const px = (pivotX !== undefined) ? pivotX : pRect.width / 2;
      const py = (pivotY !== undefined) ? pivotY : pRect.height / 2;

      const newScrollLeft = (plano.scrollLeft + px) * ratio - px;
      const newScrollTop = (plano.scrollTop + py) * ratio - py;

      contenedor.style.transform = `scale(${scale})`;
      plano.scrollLeft = newScrollLeft;
      plano.scrollTop = newScrollTop;
      if (window.drawVisor) window.drawVisor();
    }

    function isPortrait() {
      return false; // Sin rotacion en movil
    }

    function fitToScreen() {
      const pRect = plano.getBoundingClientRect();
      const scaleX = pRect.width  / SVG_W;
      const scaleY = pRect.height / SVG_H;
      scale = Math.min(scaleX, scaleY) * 0.96;

      contenedor.style.transform = `scale(${scale})`;

      // Centrar el SVG en el viewport
      requestAnimationFrame(() => {
        const svgW = SVG_W * scale;
        const svgH = SVG_H * scale;
        plano.scrollLeft = Math.max(0, (svgW - pRect.width)  / 2);
        plano.scrollTop  = Math.max(0, (svgH - pRect.height) / 2);
      });
    }

    plano.addEventListener("wheel", function(e) {
      e.preventDefault();
      const rect = plano.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.12 : 0.88;
      applyScale(scale * factor, mouseX, mouseY);
      if (window.mostrarMinimapa) window.mostrarMinimapa();
    }, { passive: false });

    plano.addEventListener("mousedown", function(e) {
      if (e.button !== 0) return;
      isPanning = true;
      panStart = { x: e.clientX, y: e.clientY };
      scrollStart = { left: plano.scrollLeft, top: plano.scrollTop };
      plano.classList.add("panning");
    });

    window.addEventListener("mousemove", function(e) {
      if (!isPanning) return;
      plano.scrollLeft = scrollStart.left - (e.clientX - panStart.x);
      plano.scrollTop = scrollStart.top - (e.clientY - panStart.y);
    });

    window.addEventListener("mouseup", function() {
      isPanning = false;
      plano.classList.remove("panning");
    });

    function buscar() {
      const id = document.getElementById("inputID").value.trim().toUpperCase();
      if (!id) return;
      limpiarActivo();

      const grupo = document.getElementById(id);
      if (!grupo) { alert("ID no encontrado: " + id); return; }

      grupo.classList.add("activo");
      hacerParpadear(grupo);

      const targetScale = 6;
      const bbox = grupo.getBBox();
      const cx = bbox.x + bbox.width  / 2;
      const cy = bbox.y + bbox.height / 2;

      scale = targetScale;
      contenedor.style.transform = `scale(${scale})`;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const pRect = plano.getBoundingClientRect();
          plano.scrollLeft = cx * scale - pRect.width  / 2;
          plano.scrollTop  = cy * scale - pRect.height / 2;
          if (window.drawVisor) window.drawVisor();
        });
      });

      mostrarInfo(id);
      
      if (window.mostrarMinimapa) window.mostrarMinimapa();
      
      setTimeout(() => { if (window.renderMinimap) window.renderMinimap(); }, 500);
    }

    function limpiarActivo() {
      document.querySelectorAll(".activo").forEach(el => {
        if (el._intervalo) { clearInterval(el._intervalo); delete el._intervalo; }
        el.classList.remove("activo");
        // Limpiar estilos en el siguiente frame para evitar condición de carrera con el intervalo
        requestAnimationFrame(() => {
          el.querySelectorAll("path").forEach(p => {
            p.style.fill = "";
            p.style.stroke = "";
          });
        });
      });
    }

    function hacerParpadear(grupo) {
      if (grupo._intervalo) clearInterval(grupo._intervalo);
      let v = true;
      grupo._intervalo = setInterval(() => {
        grupo.querySelectorAll("path").forEach(p => {
          p.style.fill = v ? "yellow" : "";
          p.style.stroke = v ? "red" : "";
        });
        v = !v;
      }, 500);
    }

    function mostrarInfo(id) {
      if (window.matchMedia("(max-width: 600px)").matches) return;
      const data = detectores[id];
      document.getElementById("infoID").textContent = id;
      document.getElementById("infoTipo").textContent = data ? data.tipo : "Detector";
      const img = document.getElementById("infoImg");
      if (data && data.imagen) { img.src = data.imagen; img.style.display = "block"; }
      else { img.style.display = "none"; }
      const desc = document.getElementById("infoDesc");
      if (data) {
        desc.innerHTML = `<p style="font-size:13px;color:#444;margin-top:6px"><strong>Ubicación:</strong> ${data.ubicacion}<br><strong>Referencia:</strong> ${data.referencia}</p>`;
      } else {
        desc.innerHTML = "<p style='font-size:13px;color:#888'>Sin información disponible</p>";
      }
      document.getElementById("info").style.display = "block";
    }

    function cerrarInfo() {
      document.getElementById("info").style.display = "none";
    }

    function reiniciar() {
      limpiarActivo();
      fitToScreen();
      document.getElementById("info").style.display = "none";
      document.getElementById("inputID").value = "";
      if (window.ocultarMinimapa) window.ocultarMinimapa();
    }

    // ── MINIMAPA ──────────────────────────────────────────
    (function() {
      const MM_W = 286, MM_H_BODY = 55; // canvas area height
      const miniEl   = document.getElementById("minimapa");
      const canvas   = document.getElementById("minimapa-canvas");
      const visor    = document.getElementById("minimapa-visor");
      const ctx      = canvas.getContext("2d");
      let mmCollapsed = false;
      let mmDragging  = false;

      let mmVisible = false;

      function mostrarMinimapa() {
        if (mmVisible) return;
        mmVisible = true;
        miniEl.style.display = "block";
        
        requestAnimationFrame(() => {
          requestAnimationFrame(() => { miniEl.style.opacity = "1"; });
        });
        if (!mmCollapsed) renderMinimap();
      }

      function ocultarMinimapa() {
        if (!mmVisible) return;
        mmVisible = false;
        miniEl.style.opacity = "0";
        setTimeout(() => { if (!mmVisible) miniEl.style.display = "none"; }, 300);
      }

      window.mostrarMinimapa = mostrarMinimapa;
      window.ocultarMinimapa = ocultarMinimapa;
      window.drawVisor = drawVisor;

      function toggleMinimapa() {
        mmCollapsed = !mmCollapsed;
        miniEl.classList.toggle("collapsed", mmCollapsed);
        document.getElementById("minimapa-toggle").textContent = mmCollapsed ? "▲" : "▼";
        if (!mmCollapsed) renderMinimap();
      }
      window.toggleMinimapa = toggleMinimapa;
      window.renderMinimap = renderMinimap;

      function getScaleXY() {
        
        const cw = canvas.offsetWidth  || MM_W;
        const ch = canvas.offsetHeight || MM_H_BODY;
        return { rx: cw / SVG_W, ry: ch / SVG_H };
      }

      function renderMinimap() {
        if (mmCollapsed) return;
        const cw = canvas.offsetWidth  || MM_W;
        const ch = canvas.offsetHeight || MM_H_BODY;
        canvas.width  = cw;
        canvas.height = ch;

        
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, cw, ch);
        
        ctx.strokeStyle = "#f0f0f0";
        ctx.lineWidth = 0.3;

        const svg = document.querySelector("#contenedorSVG svg");
        if (!svg) { drawVisor(); return; }

        
        const rx = cw / SVG_W;
        const ry = ch / SVG_H;

        
        const paths = svg.querySelectorAll("path");

        ctx.save();
        ctx.scale(rx, ry);

        
        ctx.fillStyle = "rgba(0, 84, 166, 0.04)";
        paths.forEach(p => {
          try {
            const d = p.getAttribute("d");
            if (!d) return;
            const path2d = new Path2D(d);
            ctx.fill(path2d);
          } catch(e) {}
        });

        
        
        const activoEl = svg.querySelector(".activo");
        paths.forEach(p => {
          try {
            const d = p.getAttribute("d");
            if (!d) return;
            const path2d = new Path2D(d);
            const isActivo = activoEl && activoEl.contains(p);
            if (isActivo) {
              ctx.strokeStyle = "#ff0000";
              ctx.lineWidth = 1.5 / rx;
            } else {
              
              const stroke = p.getAttribute("stroke") || getComputedStyle(p).stroke || "#00e5ff";
              const isRed  = stroke.includes("ff0000") || stroke === "red";
              const isMag  = stroke.includes("ff00ff") || stroke === "magenta";
              const isBlue = stroke.includes("0000ff") || stroke === "blue";
              ctx.strokeStyle = isRed ? "#ff0000"
                              : isMag ? "#ff00ff"
                              : isBlue ? "#0000ff"
                              : "#767676";
              ctx.lineWidth = 0.4 / rx;
            }
            ctx.stroke(path2d);
          } catch(e) {}
        });

        ctx.restore();
        drawVisor();
      }

      function drawVisor() {
        if (mmCollapsed) return;
        const { rx, ry } = getScaleXY();
        const pRect = plano.getBoundingClientRect();
        
        const visX = plano.scrollLeft / scale;
        const visY = plano.scrollTop  / scale;
        const visW = pRect.width  / scale;
        const visH = pRect.height / scale;

        
        const vx = Math.max(0, visX) * rx;
        const vy = Math.max(0, visY) * ry;
        const vw = Math.min(visW, SVG_W - Math.max(0,visX)) * rx;
        const vh = Math.min(visH, SVG_H - Math.max(0,visY)) * ry;

        
        visor.style.left   = vx + "px";
        visor.style.top    = (20 + vy) + "px";
        visor.style.width  = Math.max(6, vw) + "px";
        visor.style.height = Math.max(6, vh) + "px";
      }

      
      function mmScrollTo(e) {
        if (mmCollapsed) return;
        const rect = canvas.getBoundingClientRect();
        const { rx, ry } = getScaleXY();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const svgX = mx / rx;
        const svgY = my / ry;
        const pRect = plano.getBoundingClientRect();
        plano.scrollLeft = svgX * scale - pRect.width  / 2;
        plano.scrollTop  = svgY * scale - pRect.height / 2;
        drawVisor();
      }

      canvas.addEventListener("mousedown", function(e) {
        mmDragging = true;
        mmScrollTo(e);
        e.stopPropagation();
      });
      window.addEventListener("mousemove", function(e) {
        if (mmDragging) mmScrollTo(e);
      });
      window.addEventListener("mouseup", function() { mmDragging = false; });

      
      canvas.addEventListener("touchstart", function(e) {
        mmScrollTo(e.touches[0]);
        e.preventDefault();
      }, { passive: false });
      canvas.addEventListener("touchmove", function(e) {
        mmScrollTo(e.touches[0]);
        e.preventDefault();
      }, { passive: false });

      
      plano.addEventListener("scroll", drawVisor, { passive: true });

      
      window.addEventListener("load", () => {
        
        const svg = document.querySelector("#contenedorSVG svg");
        if (svg) {
          const seenIds = new Set();
          svg.querySelectorAll("text[id]").forEach(texto => {
            const tid = texto.id;
            // Ignorar IDs duplicados (ej: dos ESTACIONAMIENTO)
            if (seenIds.has(tid)) { texto.removeAttribute("id"); return; }
            seenIds.add(tid);
            let simbolo = texto.previousElementSibling;
            while (simbolo && simbolo.tagName !== "path") simbolo = simbolo.previousElementSibling;
            if (simbolo) {
              const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
              g.setAttribute("id", tid);
              texto.removeAttribute("id"); // Evitar IDs duplicados en el DOM
              simbolo.parentNode.insertBefore(g, simbolo);
              g.appendChild(simbolo);
              g.appendChild(texto);
            }
          });
        }
        fitToScreen();
        setTimeout(() => { renderMinimap(); }, 400);
      });      
      window.addEventListener("resize", () => {
        fitToScreen();
        if (!mmCollapsed) renderMinimap();
      });
      
      setInterval(() => { if (mmVisible && !mmCollapsed) drawVisor(); }, 200);
      
      setInterval(() => { if (mmVisible && !mmCollapsed) renderMinimap(); }, 4000);
    })();
    // ─────────────────────────────────────────────────────

    // ── Pinch-to-zoom táctil ──────────────────────────────
    let pinchDist0 = null;
    let pinchScale0 = null;
    let pinchMidX = 0, pinchMidY = 0;

    plano.addEventListener("touchstart", function(e) {
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        pinchDist0  = Math.hypot(dx, dy);
        pinchScale0 = scale;
        const rect = plano.getBoundingClientRect();
        pinchMidX = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
        pinchMidY = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
        e.preventDefault();
      }
    }, { passive: false });

    plano.addEventListener("touchmove", function(e) {
      if (e.touches.length === 2 && pinchDist0 !== null) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const newScale = Math.min(Math.max(pinchScale0 * (dist / pinchDist0), 0.1), 12);
        applyScale(newScale, pinchMidX, pinchMidY);
        e.preventDefault();
      }
    }, { passive: false });

    plano.addEventListener("touchend", function(e) {
      if (e.touches.length < 2) {
        pinchDist0 = null;
        pinchScale0 = null;
        if (window.mostrarMinimapa) window.mostrarMinimapa();
      }
    });
    // ─────────────────────────────────────────────────────

  </script>
