<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- ── PWA / iPhone ── -->
  <link rel="manifest" href="../../manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PDM">
  <meta name="theme-color" content="#004aad">
  <link rel="apple-touch-icon" href="../../icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="../../icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="../../icons/icon-120.png">
  <link rel="apple-touch-icon" sizes="76x76"  href="../../icons/icon-76.png">
  <!-- Splash screens iPhone (mínimo requerido para standalone iOS) -->
  <meta name="apple-touch-fullscreen" content="yes">
  <title>PDM — HMI Monitoreo</title>
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    .page { padding:14px 14px calc(var(--nav-h) + 14px); }
    .equipos-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .equipo-card { background:var(--surface); border-radius:var(--radius-md); border:1.5px solid var(--border); padding:14px; }
    .equipo-card.ok   { border-color:#1d9e75; }
    .equipo-card.warn { border-color:#f59e0b; }
    .equipo-card.err  { border-color:#e24b4a; }
    .equipo-card.off  { opacity:.6; }
    .eq-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .eq-icon { font-size:22px; }
    .eq-name { font-size:.82rem; font-weight:600; margin-top:4px; color:var(--text); }
    .eq-loc  { font-size:.7rem; color:var(--text-hint); }
    .gauge-row { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
    .gauge-item { display:flex; flex-direction:column; gap:3px; }
    .gauge-label { display:flex; justify-content:space-between; font-size:.68rem; color:var(--text-sub); }
    .gauge-bar { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
    .gauge-fill { height:100%; border-radius:3px; transition:width .8s cubic-bezier(.4,0,.2,1); }
    .gauge-fill.ok   { background:var(--success); }
    .gauge-fill.warn { background:var(--warning); }
    .gauge-fill.err  { background:var(--danger); }
    .section-label { font-size:.72rem; font-weight:600; letter-spacing:.08em; color:var(--text-sub); margin:18px 0 8px; }
    .alert-list { display:flex; flex-direction:column; gap:8px; }
    .alert-item { background:var(--surface); border-radius:var(--radius-sm); border-left:3px solid transparent; padding:10px 12px; display:flex; gap:10px; align-items:flex-start; font-size:.8rem; }
    .alert-item.warn { border-color:var(--warning); }
    .alert-item.err  { border-color:var(--danger); }
    .alert-item.ok   { border-color:var(--success); }
    .alert-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
    .alert-title { font-weight:600; color:var(--text); }
    .alert-time  { color:var(--text-hint); font-size:.7rem; margin-top:2px; }
    .refresh-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .refresh-bar .ts { font-size:.72rem; color:var(--text-hint); font-family:var(--mono); }
    .btn-refresh { font-size:.75rem; font-weight:500; color:var(--blue); background:var(--blue-light); border-radius:20px; padding:5px 12px; }
    .status-summary { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="../../menu.html" class="back-btn">&#8592;</a>
    <h1>&#128421;&#65039; Dashboard</h1>
    <span class="badge">EN VIVO</span>
  </header>

  <div class="page">
    <div class="refresh-bar">
      <span class="ts" id="last-update">—</span>
      <button class="btn-refresh" id="btn-refresh">&#8635; Actualizar</button>
    </div>
    <div class="status-summary" id="status-summary"></div>
    <div class="section-label">EQUIPOS</div>
    <div class="equipos-grid" id="equipos-grid"></div>
    <div class="section-label">ALERTAS RECIENTES</div>
    <div class="alert-list" id="alert-list"></div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      HMI
    </div>
    <div class="nav-item" onclick="location.href='../../menu.html'">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0h6"/></svg>
      Inicio
    </div>
    <div class="nav-item" onclick="location.href='../../index.html'" id="nav-salir">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Salir
    </div>
  </nav>

  <script>
    // Auth check
    function getUser() {
      try {
        var t = localStorage.getItem('pdm_token');
        if (!t) return null;
        var d = JSON.parse(atob(t));
        if (Date.now() > d.exp) { localStorage.removeItem('pdm_token'); return null; }
        return d;
      } catch(e) { return null; }
    }
    if (!getUser()) location.href = '../../index.html';

    document.getElementById('nav-salir').addEventListener('click', function() {
      if (confirm('Cerrar sesion?')) {
        localStorage.removeItem('pdm_token');
        location.href = '../../index.html';
      }
    });

    // Mock data
    var EQUIPOS = [
      { id:'COMP-01',  nombre:'Compresor #1',    ubicacion:'Sala maquinas', icono:'🔩', base:{temp:68,presion:82,vibr:14} },
      { id:'PUMP-02',  nombre:'Bomba centrif.',   ubicacion:'Cuarto bombas', icono:'💧', base:{temp:54,presion:91,vibr:8}  },
      { id:'MOTOR-03', nombre:'Motor principal',  ubicacion:'Linea 1',       icono:'⚡', base:{temp:73,presion:76,vibr:22} },
      { id:'CHILL-04', nombre:'Chiller',          ubicacion:'Azotea',        icono:'❄️', base:{temp:12,presion:65,vibr:5}  },
      { id:'CONV-05',  nombre:'Banda transport.', ubicacion:'Linea 2',       icono:'📦', base:{temp:41,presion:88,vibr:17} },
      { id:'PUMP-06',  nombre:'Bomba auxiliar',   ubicacion:'Cuarto bombas', icono:'💧', apagado:true }
    ];

    var ALERTAS = [
      { tipo:'err',  icono:'🔴', titulo:'Vibracion alta — MOTOR-03',     tiempo:'hace 4 min' },
      { tipo:'warn', icono:'🟡', titulo:'Temperatura elevada — COMP-01', tiempo:'hace 12 min' },
      { tipo:'ok',   icono:'🟢', titulo:'Chiller restaurado',             tiempo:'hace 28 min' },
      { tipo:'warn', icono:'🟡', titulo:'Presion baja — CONV-05',        tiempo:'hace 45 min' }
    ];

    function rnd(base, delta) { return Math.min(100, Math.max(0, base + (Math.random()-.5)*delta*2)); }
    function status(temp, vibr) { if(temp>85||vibr>25) return 'err'; if(temp>75||vibr>18) return 'warn'; return 'ok'; }
    function barClass(pct, w, e) { if(pct>=e) return 'err'; if(pct>=w) return 'warn'; return 'ok'; }

    function buildData() {
      return EQUIPOS.map(function(eq) {
        if (eq.apagado) return Object.assign({}, eq, {status:'off', temp:0, presion:0, vibr:0});
        var temp    = rnd(eq.base.temp, 5);
        var presion = rnd(eq.base.presion, 4);
        var vibr    = rnd(eq.base.vibr, 3);
        return Object.assign({}, eq, {temp:temp, presion:presion, vibr:vibr, status:status(temp,vibr)});
      });
    }

    function renderSummary(equipos) {
      var ok=0,warn=0,err=0,off=0;
      equipos.forEach(function(e){ if(e.status==='ok')ok++; else if(e.status==='warn')warn++; else if(e.status==='err')err++; else off++; });
      var html = '<span class="pill ok">&#10003; '+ok+' normales</span>';
      if(warn) html += '<span class="pill warn">&#9888; '+warn+' alertas</span>';
      if(err)  html += '<span class="pill err">&#10007; '+err+' fallas</span>';
      if(off)  html += '<span class="pill off">&#9711; '+off+' apagados</span>';
      document.getElementById('status-summary').innerHTML = html;
    }

    function renderEquipos(equipos) {
      var html = '';
      equipos.forEach(function(eq) {
        if (eq.status === 'off') {
          html += '<div class="equipo-card off"><div class="eq-top"><span class="eq-icon">'+eq.icono+'</span><span class="pill off">Apagado</span></div><div class="eq-name">'+eq.nombre+'</div><div class="eq-loc">'+eq.ubicacion+'</div></div>';
          return;
        }
        var tPct = Math.round(eq.temp);
        var pPct = Math.round(eq.presion);
        var vPct = Math.min(100, Math.round(eq.vibr*4));
        var statusIcon = eq.status==='ok' ? '●' : eq.status==='warn' ? '⚠' : '✕';
        html += '<div class="equipo-card '+eq.status+'">'
          +'<div class="eq-top"><span class="eq-icon">'+eq.icono+'</span><span class="pill '+eq.status+'">'+statusIcon+'</span></div>'
          +'<div class="eq-name">'+eq.nombre+'</div>'
          +'<div class="eq-loc">'+eq.ubicacion+'</div>'
          +'<div class="gauge-row">'
          +'<div class="gauge-item"><div class="gauge-label"><span>Temp</span><span>'+tPct+'C</span></div><div class="gauge-bar"><div class="gauge-fill '+barClass(tPct,75,88)+'" style="width:'+tPct+'%"></div></div></div>'
          +'<div class="gauge-item"><div class="gauge-label"><span>Presion</span><span>'+pPct+'%</span></div><div class="gauge-bar"><div class="gauge-fill '+barClass(pPct,80,95)+'" style="width:'+pPct+'%"></div></div></div>'
          +'<div class="gauge-item"><div class="gauge-label"><span>Vibracion</span><span>'+eq.vibr.toFixed(1)+' mm/s</span></div><div class="gauge-bar"><div class="gauge-fill '+barClass(vPct,70,90)+'" style="width:'+vPct+'%"></div></div></div>'
          +'</div></div>';
      });
      document.getElementById('equipos-grid').innerHTML = html;
    }

    function renderAlertas() {
      document.getElementById('alert-list').innerHTML = ALERTAS.map(function(a) {
        return '<div class="alert-item '+a.tipo+'"><span class="alert-icon">'+a.icono+'</span><div><div class="alert-title">'+a.titulo+'</div><div class="alert-time">'+a.tiempo+'</div></div></div>';
      }).join('');
    }

    function refresh() {
      var btn = document.getElementById('btn-refresh');
      btn.disabled = true; btn.textContent = 'Actualizando...';
      setTimeout(function() {
        var data = buildData();
        renderSummary(data);
        renderEquipos(data);
        var now = new Date();
        document.getElementById('last-update').textContent = 'Actualizado: '
          + now.toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
        btn.disabled = false; btn.textContent = '\u21BB Actualizar';
      }, 500);
    }

    // Init
    var data = buildData();
    renderSummary(data);
    renderEquipos(data);
    renderAlertas();
    document.getElementById('last-update').textContent = 'Actualizado: '
      + new Date().toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('btn-refresh').addEventListener('click', refresh);
    setInterval(refresh, 30000);
  </script>

  <!-- ── Registro Service Worker ── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('../../sw.js')
          .then(function(reg) { console.log('[PDM SW] Registrado:', reg.scope); })
          .catch(function(err) { console.warn('[PDM SW] Error:', err); });
      });
    }
  </script>
</body>
</html>
