<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos Medline SCI</title>
  <link rel="stylesheet" href="../../css/global.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      background: #0054A6;
      color: white;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 15px;
      z-index: 10;
    }

    header img { height: 36px; }
    header h2 { font-size: 16px; font-weight: 500; }

    .toolbar {
      background: white;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar input {
      padding: 6px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 160px;
      outline: none;
    }
    .toolbar input:focus { border-color: #0054A6; }

    .toolbar button {
      background: #0054A6;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover { background: #003d7a; }
    .toolbar button.secondary {
      background: #666;
    }
    .toolbar button.secondary:hover { background: #444; }

    #plano {
      flex: 1;
      overflow: auto;
      background: #e8e8e8;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      cursor: grab;
      user-select: none;
      position: relative;
      /* Espacio para la bottom-nav fija */
      padding-bottom: calc(var(--nav-h, 56px) + var(--safe-bottom, 0px));
    }
    #plano.panning { cursor: grabbing; }

    #contenedorSVG {
      transform-origin: 0 0;
      display: inline-block;
      flex-shrink: 0;
    }

    #contenedorSVG svg {
      display: block;
      width: 1541px;
      height: auto;
    }

    .activo text,
    .activo tspan {
      fill: red !important;
      font-weight: bold !important;
    }

    #info {
      position: fixed;
      right: 16px;
      top: 120px;
      width: 240px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 14px;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 100;
    }
    #info h3 {
      font-size: 15px;
      color: #0054A6;
      margin-bottom: 6px;
    }
    #info p { font-size: 13px; color: #444; }
    #info img { width: 100%; margin-top: 8px; border-radius: 4px; }
    #info .close-btn {
      margin-top: 10px;
      width: 100%;
      background: #888;
      color: white;
      border: none;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #info .close-btn:hover { background: #555; }

    /* ── MÉTRICAS ── */
    #metricas {
      position: fixed;
      left: 16px;
      top: 90px;
      width: 250px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 14px;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 100;
      font-family: Arial, sans-serif;
    }
    .metricas-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .metricas-header h3 {
      font-size: 15px;
      color: #0054A6;
    }
    .metricas-header button {
      background: none;
      border: none;
      color: #888;
      font-size: 15px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
    }
    .metricas-header button:hover { color: #333; }
    #metricasTotal {
      font-size: 13px;
      color: #444;
      font-weight: bold;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .metrica-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12.5px;
      color: #333;
      margin-top: 6px;
    }
    .metrica-label { display: flex; align-items: center; gap: 6px; }
    .metrica-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }
    .metrica-valor { font-weight: bold; color: #0054A6; }
    .metrica-bar-bg {
      width: 100%;
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin-top: 3px;
      margin-bottom: 2px;
      overflow: hidden;
    }
    .metrica-bar { height: 100%; border-radius: 2px; }

    /* ── MINIMAPA ── */
    #minimapa {
      position: fixed;
      bottom: calc(var(--nav-h, 56px) + var(--safe-bottom, 0px) + 16px);
      left: 16px;
      width: 350px;       /* 1541 * 0.1 * (286/154) ≈ exact aspect */
      height: 200px;       /* 20px header + 55px canvas (544*0.1=54.4) */
      background: #f0f0f0;
      border: 2px solid #0054A6;
      border-radius: 4px;
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      cursor: crosshair;
      display: none;
      transition: opacity 0.3s ease;
      opacity: 0;
      font-family: Arial, sans-serif;
    }
    #minimapa-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 20px;
      background: #0054A6;
      color: white;
      font-size: 10px;
      font-weight: 500;
      font-family: Arial, sans-serif;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      user-select: none;
      letter-spacing: 0.3px;
    }
    #minimapa-toggle {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      padding: 0 2px;
      opacity: 0.85;
    }
    #minimapa-toggle:hover { opacity: 1; }
    #minimapa canvas {
      display: block;
      position: absolute;
      top: 20px; left: 0;
      width: 100%;
      height: calc(100% - 20px);
      background: white;
    }
    #minimapa-visor {
      position: absolute;
      border: 2px solid #0054A6;
      background: rgba(0,84,166,0.10);
      pointer-events: none;
      border-radius: 1px;
      top: 20px;
    }
    #minimapa.collapsed { height: 24px; cursor: default; }
    #minimapa.collapsed canvas,
    #minimapa.collapsed #minimapa-visor { display: none; }

    tspan { white-space: pre; }
    .s0 { fill: none; stroke: #767676; stroke-linecap: round; stroke-linejoin: round; stroke-width: .4; }
    .t1 { font-size: 2px; fill: #767676; font-family: "Sans Serif"; }
    .s2 { fill: none; stroke: #0000ff; stroke-linecap: round; stroke-linejoin: round; stroke-width: .4; }
    .t3 { font-size: 3px; fill: #0000ff; font-family: "Arial"; }
    .s4 { fill: none; stroke: #ff0000; stroke-linecap: round; stroke-linejoin: round; stroke-width: .4; }
    .t5 { font-size: 3px; fill: #ff0000; font-family: "Arial"; }
    .s6 { fill: none; stroke: #ff00ff; stroke-linecap: round; stroke-linejoin: round; stroke-width: .4; }
    .t7 { font-size: 3px; fill: #ff00ff; font-family: "Arial"; }
    .t8 { font-size: 5px; fill: #545454; font-style: italic; font-family: "Arial"; }
	
  </style>
</head>

  <!-- MINIMAPA -->
  <div id="minimapa">
    <div id="minimapa-header">
      <span>&#x1F5FA; VISTA GENERAL</span>
      <button id="minimapa-toggle" onclick="toggleMinimapa()" title="Minimizar">&#x25BC;</button>
    </div>
    <canvas id="minimapa-canvas"></canvas>
    <div id="minimapa-visor"></div>
  </div>

  <script>
    const SVG_W = 1541, SVG_H = 544;
    let scale = 1;
    let isPanning = false;
    let panStart = { x: 0, y: 0 };
    let scrollStart = { left: 0, top: 0 };

    const plano = document.getElementById("plano");
    const contenedor = document.getElementById("contenedorSVG");

    function updateZoomLabel() {
      document.getElementById("zoomLabel").textContent = Math.round(scale * 100) + "%";
    }

    function minScale() {
      // El zoom mínimo permitido es aquel donde el plano ocupa todo el ancho disponible
      return plano.clientWidth / SVG_W;
    }

    function applyScale(newScale, pivotX, pivotY) {
      const oldScale = scale;
      scale = Math.max(minScale(), Math.min(newScale, 10));

      const ratio = scale / oldScale;
      const pRect = plano.getBoundingClientRect();

      const px = (pivotX !== undefined) ? pivotX : pRect.width / 2;
      const py = (pivotY !== undefined) ? pivotY : pRect.height / 2;

      const newScrollLeft = (plano.scrollLeft + px) * ratio - px;
      const newScrollTop = (plano.scrollTop + py) * ratio - py;

      contenedor.style.transform = `scale(${scale})`;
      plano.scrollLeft = newScrollLeft;
      plano.scrollTop = newScrollTop;
      updateZoomLabel();
    }

    function fitToScreen() {
      const pRect = plano.getBoundingClientRect();
      // Altura visual real: excluir el espacio ocupado por la bottom-nav fija
      const navH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) || 56;
      const safeB = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom')) || 0;
      const availH = pRect.height - navH - safeB;
      const scaleX = pRect.width / SVG_W;
      const scaleY = availH / SVG_H;
      scale = Math.max(scaleX, Math.min(scaleX, scaleY) * 0.96);
      contenedor.style.transform = `scale(${scale})`;
      plano.scrollLeft = 0;
      plano.scrollTop = 0;
      updateZoomLabel();
    }

    // Muestra el minimapa solo si el zoom es mayor al mínimo (ancho completo de pantalla)
    function actualizarMinimapaSegunZoom() {
      if (scale <= minScale() + 0.001) {
        if (window.ocultarMinimapa) window.ocultarMinimapa();
      } else {
        if (window.mostrarMinimapa) window.mostrarMinimapa();
      }
    }

    plano.addEventListener("wheel", function(e) {
      e.preventDefault();
      const rect = plano.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.12 : 0.88;
      applyScale(scale * factor, mouseX, mouseY);
      actualizarMinimapaSegunZoom();
    }, { passive: false });

    plano.addEventListener("mousedown", function(e) {
      if (e.button !== 0) return;
      isPanning = true;
      panStart = { x: e.clientX, y: e.clientY };
      scrollStart = { left: plano.scrollLeft, top: plano.scrollTop };
      plano.classList.add("panning");
    });

    window.addEventListener("mousemove", function(e) {
      if (!isPanning) return;
      plano.scrollLeft = scrollStart.left - (e.clientX - panStart.x);
      plano.scrollTop = scrollStart.top - (e.clientY - panStart.y);
    });

    window.addEventListener("mouseup", function() {
      isPanning = false;
      plano.classList.remove("panning");
    });

    window.addEventListener("resize", function() {
      const min = minScale();
      if (scale < min) applyScale(min);
      actualizarMinimapaSegunZoom();
    });

    /* ── MÉTRICAS ── */
    const coloresTipo = {
      "Detector de humo": "#0054A6",
      "Estacion manual": "#e63946",
      "FotoBeam": "#ff9f1c",
      "Riser": "#2a9d8f"
    };

    let metricasVisible = false;

    function calcularMetricas() {
      const conteo = {};
      let total = 0;
      Object.values(detectores).forEach(d => {
        conteo[d.tipo] = (conteo[d.tipo] || 0) + 1;
        total++;
      });
      return { conteo, total };
    }

    function renderMetricas() {
      const { conteo, total } = calcularMetricas();
      document.getElementById("metricasTotal").textContent = `Total de dispositivos: ${total}`;

      const lista = document.getElementById("metricasLista");
      lista.innerHTML = "";

      Object.keys(conteo)
        .sort((a, b) => conteo[b] - conteo[a])
        .forEach(tipo => {
          const cantidad = conteo[tipo];
          const pct = total ? (cantidad / total) * 100 : 0;
          const color = coloresTipo[tipo] || "#888";

          const item = document.createElement("div");
          item.className = "metrica-item";
          item.innerHTML = `
            <div class="metrica-label">
              <span class="metrica-dot" style="background:${color}"></span>
              <span>${tipo}</span>
            </div>
            <div class="metrica-valor">${cantidad}</div>
          `;
          lista.appendChild(item);

          const barBg = document.createElement("div");
          barBg.className = "metrica-bar-bg";
          barBg.innerHTML = `<div class="metrica-bar" style="width:${pct}%;background:${color}"></div>`;
          lista.appendChild(barBg);
        });
    }

    function toggleMetricas() {
      metricasVisible = !metricasVisible;
      document.getElementById("metricas").style.display = metricasVisible ? "block" : "none";
      if (metricasVisible) renderMetricas();
    }

    function buscar() {
      const id = document.getElementById("inputID").value.trim().toUpperCase();
      limpiarActivo();

      const grupo = document.getElementById(id);
      if (!grupo) { alert("ID no encontrado: " + id); return; }

      grupo.classList.add("activo");
      hacerParpadear(grupo);

      const targetScale = 6;
      const bbox = grupo.getBBox();
      const cx = bbox.x + bbox.width / 2;
      const cy = bbox.y + bbox.height / 2;

      scale = targetScale;
      contenedor.style.transform = `scale(${scale})`;
      updateZoomLabel();

      setTimeout(() => {
        const pRect = plano.getBoundingClientRect();
        plano.scrollTo({
          left: cx * scale - pRect.width / 2,
          top: cy * scale - pRect.height / 2,
          behavior: "smooth"
        });
      }, 50);

      mostrarInfo(id);
      // Mostrar minimapa al buscar
      if (window.mostrarMinimapa) window.mostrarMinimapa();
      // Refrescar minimapa tras el scroll suave
      setTimeout(() => { if (window.renderMinimap) window.renderMinimap(); }, 500);
    }

    function limpiarActivo() {
      document.querySelectorAll(".activo").forEach(el => {
        el.classList.remove("activo");
        if (el._intervalo) { clearInterval(el._intervalo); delete el._intervalo; }
        el.querySelectorAll("path").forEach(p => { p.style.fill = ""; p.style.stroke = ""; });
      });
    }

    function hacerParpadear(grupo) {
      if (grupo._intervalo) clearInterval(grupo._intervalo);
      let v = true;
      grupo._intervalo = setInterval(() => {
        grupo.querySelectorAll("path").forEach(p => {
          p.style.fill = v ? "yellow" : "";
          p.style.stroke = v ? "red" : "";
        });
        v = !v;
      }, 500);
    }

    function mostrarInfo(id) {
      const data = detectores[id];
      document.getElementById("infoID").textContent = id;
      document.getElementById("infoTipo").textContent = data ? data.tipo : "Detector";
      const img = document.getElementById("infoImg");
      if (data && data.imagen) { img.src = data.imagen; img.style.display = "block"; }
      else { img.style.display = "none"; }
      const desc = document.getElementById("infoDesc");
      if (data) {
        desc.innerHTML = `<p style="font-size:13px;color:#444;margin-top:6px"><strong>Ubicación:</strong> ${data.ubicacion}<br><strong>Referencia:</strong> ${data.referencia}</p>`;
      } else {
        desc.innerHTML = "<p style='font-size:13px;color:#888'>Sin información disponible</p>";
      }
      document.getElementById("info").style.display = "block";
    }

    function cerrarInfo() {
      document.getElementById("info").style.display = "none";
    }

    function reiniciar() {
      limpiarActivo();
      fitToScreen();
      document.getElementById("info").style.display = "none";
      document.getElementById("inputID").value = "";
      if (window.ocultarMinimapa) window.ocultarMinimapa();
    }

    // ── MINIMAPA ──────────────────────────────────────────
    (function() {
      const MM_W = 286, MM_H_BODY = 55; // canvas area height
      const miniEl   = document.getElementById("minimapa");
      const canvas   = document.getElementById("minimapa-canvas");
      const visor    = document.getElementById("minimapa-visor");
      const ctx      = canvas.getContext("2d");
      let mmCollapsed = false;
      let mmDragging  = false;

      let mmVisible = false;

      function mostrarMinimapa() {
        if (mmVisible) return;
        mmVisible = true;
        miniEl.style.display = "block";
        // Force reflow then fade in
        requestAnimationFrame(() => {
          requestAnimationFrame(() => { miniEl.style.opacity = "1"; });
        });
        if (!mmCollapsed) renderMinimap();
      }

      function ocultarMinimapa() {
        if (!mmVisible) return;
        mmVisible = false;
        miniEl.style.opacity = "0";
        setTimeout(() => { if (!mmVisible) miniEl.style.display = "none"; }, 300);
      }

      window.mostrarMinimapa = mostrarMinimapa;
      window.ocultarMinimapa = ocultarMinimapa;

      function toggleMinimapa() {
        mmCollapsed = !mmCollapsed;
        miniEl.classList.toggle("collapsed", mmCollapsed);
        document.getElementById("minimapa-toggle").textContent = mmCollapsed ? "▲" : "▼";
        if (!mmCollapsed) renderMinimap();
      }
      window.toggleMinimapa = toggleMinimapa;
      window.renderMinimap = renderMinimap;

      function getScaleXY() {
        // ratio: minimap canvas / real SVG
        const cw = canvas.offsetWidth  || MM_W;
        const ch = canvas.offsetHeight || MM_H_BODY;
        return { rx: cw / SVG_W, ry: ch / SVG_H };
      }

      function renderMinimap() {
        if (mmCollapsed) return;
        const cw = canvas.offsetWidth  || MM_W;
        const ch = canvas.offsetHeight || MM_H_BODY;
        canvas.width  = cw;
        canvas.height = ch;

        // Fondo blanco igual que la pagina principal
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, cw, ch);
        // Borde sutil de grilla
        ctx.strokeStyle = "#f0f0f0";
        ctx.lineWidth = 0.3;

        const svg = document.querySelector("#contenedorSVG svg");
        if (!svg) { drawVisor(); return; }

        // Escala: de coordenadas SVG (1541 x 544) al canvas del minimapa
        const rx = cw / SVG_W;
        const ry = ch / SVG_H;

        // Recopilar todos los <path> del SVG y dibujar solo su contorno
        const paths = svg.querySelectorAll("path");

        ctx.save();
        ctx.scale(rx, ry);

        // Primero, relleno muy sutil para dar sensacion de area
        ctx.fillStyle = "rgba(0, 84, 166, 0.04)";
        paths.forEach(p => {
          try {
            const d = p.getAttribute("d");
            if (!d) return;
            const path2d = new Path2D(d);
            ctx.fill(path2d);
          } catch(e) {}
        });

        // Luego, contornos nítidos
        // Detectar si el path pertenece a elemento activo
        const activoEl = svg.querySelector(".activo");
        paths.forEach(p => {
          try {
            const d = p.getAttribute("d");
            if (!d) return;
            const path2d = new Path2D(d);
            const isActivo = activoEl && activoEl.contains(p);
            if (isActivo) {
              ctx.strokeStyle = "#ff0000";
              ctx.lineWidth = 1.5 / rx;
            } else {
              // Color segun stroke original del path
              const stroke = p.getAttribute("stroke") || getComputedStyle(p).stroke || "#00e5ff";
              const isRed  = stroke.includes("ff0000") || stroke === "red";
              const isMag  = stroke.includes("ff00ff") || stroke === "magenta";
              const isBlue = stroke.includes("0000ff") || stroke === "blue";
              ctx.strokeStyle = isRed ? "#ff0000"
                              : isMag ? "#ff00ff"
                              : isBlue ? "#0000ff"
                              : "#767676";
              ctx.lineWidth = 0.4 / rx;
            }
            ctx.stroke(path2d);
          } catch(e) {}
        });

        ctx.restore();
        drawVisor();
      }

      function drawVisor() {
        if (mmCollapsed) return;
        const { rx, ry } = getScaleXY();
        const pRect = plano.getBoundingClientRect();
        // Visible area in SVG coords
        const visX = plano.scrollLeft / scale;
        const visY = plano.scrollTop  / scale;
        const visW = pRect.width  / scale;
        const visH = pRect.height / scale;

        // Clamp to SVG bounds
        const vx = Math.max(0, visX) * rx;
        const vy = Math.max(0, visY) * ry;
        const vw = Math.min(visW, SVG_W - Math.max(0,visX)) * rx;
        const vh = Math.min(visH, SVG_H - Math.max(0,visY)) * ry;

        // Position the visor div (it sits on top of canvas, offset by header 18px)
        visor.style.left   = vx + "px";
        visor.style.top    = (20 + vy) + "px";
        visor.style.width  = Math.max(6, vw) + "px";
        visor.style.height = Math.max(6, vh) + "px";
      }

      // Click / drag on minimap → scroll main view
      function mmScrollTo(e) {
        if (mmCollapsed) return;
        const rect = canvas.getBoundingClientRect();
        const { rx, ry } = getScaleXY();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const svgX = mx / rx;
        const svgY = my / ry;
        const pRect = plano.getBoundingClientRect();
        plano.scrollLeft = svgX * scale - pRect.width  / 2;
        plano.scrollTop  = svgY * scale - pRect.height / 2;
        drawVisor();
      }

      canvas.addEventListener("mousedown", function(e) {
        mmDragging = true;
        mmScrollTo(e);
        e.stopPropagation();
      });
      window.addEventListener("mousemove", function(e) {
        if (mmDragging) mmScrollTo(e);
      });
      window.addEventListener("mouseup", function() { mmDragging = false; });

      // Touch support
      canvas.addEventListener("touchstart", function(e) {
        mmScrollTo(e.touches[0]);
        e.preventDefault();
      }, { passive: false });
      canvas.addEventListener("touchmove", function(e) {
        mmScrollTo(e.touches[0]);
        e.preventDefault();
      }, { passive: false });

      // Refresh visor on scroll/zoom
      plano.addEventListener("scroll", drawVisor, { passive: true });

      // Patch applyScale to refresh visor
      const _origApply = applyScale;
      window.applyScale = function(ns, px, py) {
        _origApply(ns, px, py);
        drawVisor();
      };

      // Initial render after load + on resize
      window.addEventListener("load", () => {
        setTimeout(() => { renderMinimap(); }, 400);
      });
      window.addEventListener("resize", () => {
        if (!mmCollapsed) renderMinimap();
      });

      // Periodic refresh for visor position (lightweight, only redraws visor rect)
      setInterval(() => { if (mmVisible && !mmCollapsed) drawVisor(); }, 200);
      // Full re-render occasionally (catches active element changes)
      setInterval(() => { if (mmVisible && !mmCollapsed) renderMinimap(); }, 4000);
    })();
    // ─────────────────────────────────────────────────────

    window.addEventListener("load", () => {
      const svg = document.querySelector("#contenedorSVG svg");
      if (!svg) return;

      svg.querySelectorAll("text[id]").forEach(texto => {
        let simbolo = texto.previousElementSibling;
        while (simbolo && simbolo.tagName !== "path") simbolo = simbolo.previousElementSibling;
        if (simbolo) {
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          g.setAttribute("id", texto.id);
          simbolo.parentNode.insertBefore(g, simbolo);
          g.appendChild(simbolo);
          g.appendChild(texto);
        }
      });

      fitToScreen();
    });
  </script>

  <script>
    document.getElementById('nav-salir').addEventListener('click', function () {
      if (confirm('¿Cerrar sesión?')) {
        localStorage.removeItem('pdm_token');
        location.href = '../../index.html';
      }
    });

    // En móvil, cuando aparece el teclado virtual, la barra de navegación
    // fija (bottom:0 respecto al viewport de layout) queda oculta detrás
    // del teclado porque el viewport visual se encoge pero el layout no.
    // La subimos con translateY según el espacio que ocupa el teclado.
    (function mantenerNavSobreTeclado() {
      const nav = document.querySelector('.bottom-nav');
      if (!nav || !window.visualViewport) return;
      function ajustar() {
        const vv = window.visualViewport;
        const espacioTeclado = window.innerHeight - vv.height - vv.offsetTop;
        nav.style.transform = espacioTeclado > 1 ? `translateY(-${espacioTeclado}px)` : '';
      }
      window.visualViewport.addEventListener('resize', ajustar);
      window.visualViewport.addEventListener('scroll', ajustar);
    })();
  </script>
